<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM task</title>
    <link rel="stylesheet" href="tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/2d9b320792.js" crossorigin="anonymous"></script>

</head>

<body class="bg-gray-200">
    <header>
        <h1 class="text-3xl text-blue-900 font-bold ">Job Application Tracker</h1>
        <nav class="grid grid-cols-3 gap-4">
            <div class="rounded-md p-4 font-bold bg-white">
                <p>Total</p>
                <p class="text-black text-2xl"></p>
            </div>
            <div class="rounded-md p-4 font-bold bg-white">
                <p>Interview</p>
                <p class="text-green-400 text-2xl"></p>
            </div>
            <div class="rounded-md p-4 font-bold bg-white">
                <p>Rejected</p>
                <p class="text-red-500 text-2xl"></p>
            </div>
        </nav>
        <main>
            <!-- All jobs section -->
            <h2>Available Jobs</h2>
            <!-- buttons section -->
            <section class="flex gap-4">
                <button class="rounded-sm text-xs
                p-2 bg-white text-slate-500 cursor-pointer">All</button>
                <button class="rounded-sm text-xs p-2 bg-white text-slate-500 cursor-pointer">Interview</button>
                <button class="rounded-sm text-xs p-2 bg-white text-slate-500 cursor-pointer">Rejected</button>
            </section>
            <!-- JOB CARDS SECTION -->
            <section class="mt-4 text-sm bg-white">
                <div class="p-4">
                    <div class="flex justify-between">
                        <div>
                        <span class="font-bold">Mobile First Corp</span>
                        <h4 class="text-slate-400">React Native Developer</h4>
                        </div>
                        <div>
                        <button><i class="fa-solid fa-trash fa-thin border border-gray-400 rounded-4xl p-1 cursor-pointer"></i></button>
                        </div>
                    </div>
                    <p>Remote • Full-time • $130,000-$175,000</p>
                    <span class="p-1 rounded-xs font-bold bg-blue-300">Not Applied</span>
                    <p>Build cross-platform mobile applications using React Native. Work on products used by millions of
                        users worldwide.</p>
                    <button class="bg-white p-2 uppercase font-bold text-green-400 border">Interview</button>
                    <button class="bg-white p-2 uppercase font-bold text-red-500 border">Rejected</button>
                </div>
            </section>
        </main>
    </header>
</body>

</html>
